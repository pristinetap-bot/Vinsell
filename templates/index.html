<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClearVINReport | Vehicle History Lookup</title>
    <style>
        :root {
            --navy: #102033;
            --slate: #5f6f82;
            --line: rgba(16, 32, 51, 0.1);
            --surface: rgba(255, 255, 255, 0.94);
            --green: #1d9b62;
            --green-dark: #17784c;
            --bg: #eef4f8;
            --shadow: 0 24px 60px rgba(16, 32, 51, 0.14);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Avenir Next", "Segoe UI", "Helvetica Neue", sans-serif;
            color: var(--navy);
            background:
                radial-gradient(circle at top left, rgba(29, 155, 98, 0.1), transparent 32%),
                linear-gradient(180deg, #f7fbfd 0%, var(--bg) 100%);
        }

        .wrap {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .card {
            width: min(100%, 520px);
            padding: 28px;
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 28px;
            background: var(--surface);
            box-shadow: var(--shadow);
            text-align: center;
        }

        .logo {
            width: 144px;
            height: 144px;
            margin: 0 auto 22px;
            padding: 12px;
            border-radius: 32px;
            background: linear-gradient(180deg, #ffffff, #edf3f7);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.9);
        }

        .logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 24px;
        }

        .eyebrow {
            display: inline-block;
            margin-bottom: 10px;
            padding: 7px 12px;
            border-radius: 999px;
            background: rgba(29, 155, 98, 0.1);
            color: var(--green-dark);
            font-size: 0.78rem;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        h1 {
            margin: 0;
            font-size: clamp(2rem, 6vw, 3.1rem);
            line-height: 0.98;
            letter-spacing: -0.04em;
        }

        .subtext {
            margin: 14px auto 22px;
            max-width: 30ch;
            color: var(--slate);
            font-size: 1rem;
            line-height: 1.65;
        }

        .offer {
            margin: 0 0 22px;
            padding: 22px 20px;
            border: 1px solid var(--line);
            border-radius: 22px;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(244, 248, 251, 0.92));
        }

        .price {
            font-size: 3.4rem;
            line-height: 1;
            letter-spacing: -0.06em;
            font-weight: 800;
        }

        .price-note {
            margin-top: 8px;
            color: var(--slate);
            font-size: 0.98rem;
        }

        .buy-form {
            margin: 0;
        }

        .btn {
            width: 100%;
            min-height: 58px;
            padding: 16px 20px;
            border: 0;
            border-radius: 18px;
            cursor: pointer;
            background: linear-gradient(135deg, var(--green) 0%, var(--green-dark) 100%);
            color: #fff;
            font-size: 1.05rem;
            font-weight: 800;
            box-shadow: 0 20px 40px rgba(23, 120, 76, 0.24);
        }

        .trust {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 16px;
        }

        .chip {
            padding: 9px 12px;
            border: 1px solid var(--line);
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.84);
            color: var(--navy);
            font-size: 0.84rem;
            font-weight: 700;
        }

        .proof {
            margin-top: 18px;
            color: var(--slate);
            font-size: 0.95rem;
        }

        .help {
            margin-top: 18px;
            color: var(--slate);
            font-size: 0.92rem;
            line-height: 1.6;
        }

        .help a {
            color: var(--green-dark);
            font-weight: 700;
            text-decoration: none;
        }

        .help a:hover {
            text-decoration: underline;
        }

        @media (max-width: 540px) {
            .wrap {
                padding: 14px;
            }

            .card {
                padding: 22px 18px;
                border-radius: 24px;
            }

            .logo {
                width: 120px;
                height: 120px;
                padding: 10px;
                border-radius: 28px;
            }

            .logo img {
                border-radius: 20px;
            }

            .price {
                font-size: 3rem;
            }
        }
    </style>
</head>
<body>
    <div class="wrap">
        <main class="card">
            <div class="logo">
                <img src="/static/logo.png" alt="ClearVINReport logo">
            </div>

            <div class="eyebrow">Secure vehicle history lookup</div>
            <h1>Get your report fast.</h1>
            <p class="subtext">Simple checkout, mobile-friendly payment, and direct access after successful payment.</p>

            <section class="offer">
                <div class="price">$6</div>
                <div class="price-note">One-time payment</div>
            </section>

            <form class="buy-form" action="/buy" method="POST">
                <button class="btn" type="submit">Buy Report Now</button>
            </form>

            <div class="trust">
                <div class="chip">Secure checkout</div>
                <div class="chip">Stripe powered</div>
                <div class="chip">Apple Pay supported</div>
            </div>

            <div class="proof">Trusted by {{ total_sold }}+ buyers</div>

            <div class="help">
                Need help? <a href="https://instagram.com/clearvinreport" target="_blank" rel="noopener noreferrer">@clearvinreport</a>
            </div>
        </main>
    </div>
</body>
</html>
